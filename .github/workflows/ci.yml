name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DENO_DIR: /home/runner/.cache/deno

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ${{ env.DENO_DIR }}
          key: ${{ runner.os }}-deno-${{ hashFiles('deno.lock') }}
          restore-keys: |
            ${{ runner.os }}-deno-

      - name: Type check
        run: deno check main.ts src/ tests/

      - name: Lint
        run: deno lint

      - name: Check formatting
        run: deno fmt --check

      - name: Test
        run: deno test --allow-read --allow-write --allow-env --unstable-kv
